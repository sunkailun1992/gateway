# 网关本地启动端口。当前 compose/Nacos 控制台占用 8080 映射时，可通过启动参数覆盖。
server:
  port: 8080

# 连接 Nacos 前必须先有的启动入口配置。
# 这里不能引用 reuse-configuration.yaml，因为远程配置还没有加载。
custom:
  # Nacos 默认分组，大部分公共配置放 DEFAULT_GROUP。
  nacos-group: ${NACOS_GROUP:DEFAULT_GROUP}

spring:
  profiles:
    # 只通过 APP_ENV 或 spring.profiles.active 选择 dev/test/prod；Nacos 地址和 namespace 放在对应 application-*.yml。
    active: ${APP_ENV:dev}
  application:
    # 服务注册名，网关在 Nacos 中以 gateway 注册。
    name: gateway
  main:
    # 兼容公共 utils 和业务侧可能重复声明的基础 Bean。
    allow-bean-definition-overriding: true
  cloud:
    gateway:
      server:
        webflux:
          httpclient:
            # Gateway 内置 Netty HTTP Client 解析后端响应起始行的最大长度。
            # 不是请求体、Header 或上传大小限制；用于避免异常长响应状态行触发 TooLongHttpLineException。
            max-initial-line-length: 16KB
