# 网关本地启动端口。当前 compose/Nacos 控制台占用 8080 映射时，可通过启动参数覆盖。
server:
  port: 8080

# 连接 Nacos 前必须先有的启动入口配置。
# 这里不能引用 reuse-configuration.yaml，因为远程配置还没有加载。
custom:
  # Nacos 服务端地址，默认使用蒲公英内网地址；部署时可用 NACOS_SERVER_ADDR 覆盖。
  nacos-ip: ${NACOS_SERVER_ADDR:172.16.1.39:8848}
  # Nacos 命名空间，隔离本套微服务配置和注册实例。
  namespace: ${NACOS_NAMESPACE:cfbf4c42-5ebb-4566-a095-30a568556a85}
  # Nacos 默认分组，大部分公共配置放 DEFAULT_GROUP。
  nacos-group: ${NACOS_GROUP:DEFAULT_GROUP}

spring:
  application:
    # 服务注册名，网关在 Nacos 中以 gateway 注册。
    name: gateway
  main:
    # 兼容公共 utils 和业务侧可能重复声明的基础 Bean。
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      # 服务注册与发现配置，供 Admin、其他服务或运维观察当前网关实例。
      discovery:
        server-addr: ${custom.nacos-ip}
        namespace: ${custom.namespace}
        group: ${custom.nacos-group}
      # 配置中心入口，负责加载 spring.config.import 中列出的远程 YAML。
      config:
        server-addr: ${custom.nacos-ip}
        namespace: ${custom.namespace}
        group: ${custom.nacos-group}
        file-extension: yaml
    gateway:
      server:
        webflux:
          httpclient:
            # Gateway 内置 Netty HTTP Client 解析后端响应起始行的最大长度。
            # 不是请求体、Header 或上传大小限制；用于避免异常长响应状态行触发 TooLongHttpLineException。
            max-initial-line-length: 16KB
  config:
    import:
      # logging.yml：日志级别、日志路径等通用日志配置。
      - "optional:nacos:logging.yml?group=DEFAULT_GROUP&refreshEnabled=true"
      # reuse-configuration.yaml：MySQL、Redis、Nacos、Admin、Zipkin 等基础设施公共地址变量。
      - "optional:nacos:reuse-configuration.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      # gateway.yaml：网关自身业务配置，例如跨域、限流开关等非 Spring 路由配置。
      - "optional:nacos:gateway.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      # gateway-spring.yaml：Spring Cloud Gateway 路由、过滤器和 Redis 限流等 Spring 体系配置。
      - "optional:nacos:gateway-spring.yaml?group=test&refreshEnabled=true"
      # redis.yaml：Redis 客户端配置，供网关限流等能力使用。
      - "optional:nacos:redis.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      # zipkin.yaml：链路追踪上报地址和采样配置。
      - "optional:nacos:zipkin.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      # admin.yaml：Spring Boot Admin 客户端注册配置。
      - "optional:nacos:admin.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
